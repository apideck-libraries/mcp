overlay: 1.0.0
info:
  title: Apideck MCP Overlay — Accounting, Ats, Connector, Crm, Ecommerce, Filestorage,
    Hris, Issuetracking, Proxy, Vault, Webhook
  version: 0.0.1
actions:
- target: $.paths["/sms/messages"].*
  update:
    x-speakeasy-mcp:
      disabled: true
- target: $.paths["/sms/messages/{id}"].*
  update:
    x-speakeasy-mcp:
      disabled: true
- target: $.paths.*["get","head"]
  update:
    x-speakeasy-mcp:
      scopes:
      - read
- target: $.paths.*["post","put","patch"]
  update:
    x-speakeasy-mcp:
      scopes:
      - write
- target: $.paths.*["delete"]
  update:
    x-speakeasy-mcp:
      scopes:
      - destructive
