name: Publish to npm

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

"on":
  push:
    branches:
      - main
    paths:
      # Anything that affects the published tarball. The release job
      # no-ops cleanly when there is no SDK change, and publish-npm
      # already skips when the version is already on npm — so this
      # trigger is idempotent.
      - package.json
      - src/**
      - bin/**
  workflow_dispatch: {}

jobs:
  release:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: unify-mcp
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Check if version already published
        id: version-check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@apideck/mcp@$LOCAL_VERSION" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $LOCAL_VERSION already exists on npm — skipping publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION not yet published"
          fi

      - name: Build
        if: steps.version-check.outputs.skip == 'false'
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Publish
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
