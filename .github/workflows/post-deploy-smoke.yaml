name: Post-deploy smoke

# Hits the deployed MCP endpoint after every successful Vercel
# deployment and asserts that the dynamic meta-tools still respond.
# Catches deploy-time regressions (config drift, env vars, handler
# crashes) before users do.

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      mcp_url:
        description: MCP endpoint URL to probe
        type: string
        default: https://mcp.apideck.dev/mcp

permissions:
  contents: read
  deployments: read

jobs:
  smoke:
    # deployment_status fires for every state (pending/in_progress/success/
    # failure/error). Only run on success. The environment check filters out
    # preview deploys; flip to include them if you want PR-branch coverage.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve MCP URL
        id: url
        env:
          DISPATCH_URL: ${{ github.event.inputs.mcp_url }}
        run: |
          # Probe the production custom domain rather than the per-deployment
          # alias from deployment_status.target_url:
          #   * the prod alias swap is atomic with deploy promotion — what
          #     the smoke tests is what users hit
          #   * no Deployment Protection bypass needed (custom domains aren't
          #     gated)
          #   * no DNS-propagation race for the per-deploy alias
          if [ -n "$DISPATCH_URL" ]; then
            echo "mcp_url=$DISPATCH_URL" >> "$GITHUB_OUTPUT"
          else
            echo "mcp_url=https://mcp.apideck.dev/mcp" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke test
        id: smoke
        env:
          MCP_URL: ${{ steps.url.outputs.mcp_url }}
          # Bypass kept available for `workflow_dispatch` runs that point at
          # a per-deployment alias (preview / staging URL). On the default
          # Production path the prod alias is unprotected, so this is a no-op.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          # Real upstream creds for the execute_tool stage. When unset, the
          # smoke skips the live upstream check and runs meta-tools only.
          # Suggested consumer: `test-consumer-id` (sandbox with QuickBooks /
          # Moneybird connections pre-authorized).
          APIDECK_SMOKE_API_KEY: ${{ secrets.APIDECK_SMOKE_API_KEY }}
          APIDECK_SMOKE_APP_ID: ${{ secrets.APIDECK_SMOKE_APP_ID }}
          APIDECK_SMOKE_CONSUMER_ID: ${{ secrets.APIDECK_SMOKE_CONSUMER_ID }}
        run: node test/post-deploy.mjs

      - name: Notify Slack on failure
        # Fires only when the smoke step failed and a webhook is configured.
        # Set the SLACK_WEBHOOK_URL repo secret to a Slack Incoming Webhook
        # bound to the channel that should page the on-call. When unset the
        # step is skipped silently — useful for forks and contributors.
        if: failure() && steps.smoke.outcome == 'failure' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MCP_URL: ${{ steps.url.outputs.mcp_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
          ENVIRONMENT: ${{ github.event.deployment.environment || 'workflow_dispatch' }}
          SHA: ${{ github.event.deployment.sha || github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          PAYLOAD=$(jq -n \
            --arg mcp_url "$MCP_URL" \
            --arg run_url "$RUN_URL" \
            --arg deploy_url "$DEPLOY_URL" \
            --arg environment "$ENVIRONMENT" \
            --arg sha "$SHA" \
            --arg short_sha "$SHORT_SHA" \
            '{
              text: ("🚨 Apideck MCP post-deploy smoke failed (" + $environment + " @ " + $short_sha + ")"),
              blocks: [
                { type: "header", text: { type: "plain_text", text: "🚨 Post-deploy smoke failed" } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: ("*Environment:*\n" + $environment) },
                  { type: "mrkdwn", text: ("*Commit:*\n<https://github.com/apideck-libraries/mcp/commit/" + $sha + "|" + $short_sha + ">") },
                  { type: "mrkdwn", text: ("*Probed URL:*\n" + $mcp_url) },
                  { type: "mrkdwn", text: ("*Deploy:*\n" + (if $deploy_url == "" then "—" else "<" + $deploy_url + "|Vercel>" end)) }
                ]},
                { type: "actions", elements: [
                  { type: "button", text: { type: "plain_text", text: "View workflow run" }, url: $run_url, style: "danger" }
                ]}
              ]
            }')
          curl -fsSL -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
