name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Smoke test (HTTP)
        run: node test/smoke.mjs

      - name: Smoke test (stdio)
        run: node test/stdio.test.mjs

      - name: Analytics tests
        run: node test/analytics.test.mjs

      - name: Custom generator tests
        run: |
          node test/gen.test.mjs
          node test/gen-server.test.mjs
          node test/gen-extras.test.mjs
          node test/gen-handler-e2e.test.mjs
          node test/gen-sandbox.test.mjs
          node test/gen-elicitation.test.mjs
          node test/gen-workflows.test.mjs
          node test/gen-workflow-pay-bill.test.mjs

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        run: curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
