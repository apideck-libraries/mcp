name: Generate MCP Server

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force regeneration even if spec hasn't changed
        type: boolean
        default: false
  schedule:
    # Check for spec changes daily at 6am UTC
    - cron: "0 6 * * *"

jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      speakeasy_version: latest
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  post-generate:
    needs: generate
    runs-on: ubuntu-latest
    if: always() && needs.generate.result == 'success' && needs.generate.outputs.branch_name != ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate.outputs.branch_name }}

      - name: Apply post-generation fixes
        run: ./post-generate.sh

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Apply post-generation fixes (Zod transforms + wrangler)"
          git push
