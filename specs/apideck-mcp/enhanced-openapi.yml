            PrestaShop primarily uses an `id` field to identify product associations (Ie: categories, variants etc). To
            maintain performance on the list endpoint, fewer properties are returned than other connectors.
        - connector: bigcommerce
          description: In the pagination, the limit value should be in additions of 10. E.g. 10, 20, 30, etc.
