          description: >-
            Wix V3 catalog assigns unique SKUs and weights to each product variant. The product-level `sku` and `weight`
            fields represent only the first variant for backward compatibility. To access complete variant data across
            all product variations, reference the individual `variants[].sku` and `variants[].weight` fields which
            contain the accurate data for each variant.
