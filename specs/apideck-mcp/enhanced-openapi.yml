        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: procountor-fi
          description: |
            Procountor only accepts the following values for the tax_code field: SALES, PURCHASE.
        - connector: xero
          description: >
            Xero has two separate resources: journals (journal entries generated from any type of originating
            transaction such as invoices, payments, or manual journals) and manual journals (user-created entries).

            When a journal entry is created as draft, it is stored as a manual journal and does not yet become a
            journal. Once it is posted, or if it is created as posted from the beginning, it becomes a journal. In this
            case, when a draft manual journal is changed to posted, the id will change.

            Xero only supports `draft` and `posted` for the status field.

            For ledger accounts in journal lines, you can use either `ledger_account.id` (UUID) or
            `ledger_account.code`. If only the ID is provided, the code will be resolved automatically.

            Journal entries in xero can be tax inclusive, tax exclusive or no tax. The `tax_inclusive` field should be
            set to true, false or null if the journal entry is tax inclusive, tax exclusive or no tax.
        - connector: netsuite
          description: >-
            Netsuite only supports one tracking category at a time so only the first item in the tracking_categories
            list will be used.
        - connector: mrisoftware
          description: >
            MRI Software does not provide a proper ID for journal line items. Instead, each journal line item is
            identified by a combination of GLREFERENCE, PERIOD, and ITEM. These fields are mapped to unify with the
            properties number, accounting_period, and line_number, respectively. Additionally, MRI Software requires a
            GLSOURCE field, which is not supported by Unify. Therefore, it will be sent statically as "GL" (General
            Ledger).
        - connector: quickbooks
          description: >
            Quickbooks only supports one tracking category at a time so only the first item in the tracking_categories
            list will be used.

            Line-level tax fields (tax_rate, tax_amount, tax_type) on journal entries are only supported for non-US
            QuickBooks companies (UK, CA, AU, etc.). US-based QuickBooks companies silently discard all tax fields — the
            request succeeds but no tax data is persisted.

            For US companies that need to reflect tax in journal entries, add a separate line item posting the tax
            amount to a tax liability ledger account (e.g., "Sales Tax Payable"). This keeps the journal entry balanced
            in the general ledger, but will not populate QuickBooks Sales Tax reports — for that, use invoices or sales
            receipts instead.

            When line_items[].tax_type is not set, QuickBooks requires knowing whether the tax applies to a sales or
            purchase transaction. Unify infers this from line_items[].type: credit lines are treated as sales
            (TaxApplicableOn: Sales) and debit lines as purchases (TaxApplicableOn: Purchase). This covers the common
            case of sales summary journal entries. For atypical entries (e.g. a credit to an AP account, or a debit for
            a sales return), set tax_type explicitly on each line to override the default.
        - connector: sage-intacct
          description: |
            Sage Intacct only supports `draft` and `posted` status fields when updating a journal entry.
            If no status is provided then the default status is "draft".
            Only Journal Entries with `draft` status can be updated.
        - connector: workday
          description: >
            Status should be set to "draft" or "posted". Default status is "draft".

            Only Journal Entries with `draft` status can be updated.

            It is required to provide Cost_Center_Reference_ID as worktag in the line items, otherwise the status will
            automatically be set to "draft".
        - connector: microsoft-dynamics-365-business-central
          description: >
            Employee account type: journal entry lines can reference employees via the `employee` field (use
            `display_id` for the employee number, or `id` with a GUID which will be resolved automatically). Note:
            reading back the journal entry will NOT return the employee reference — employee lines are invisible in BC's
            API for draft entries, and resolve to a GL payable account when posted. Send `ledger_account: {}` alongside
            the `employee` field to satisfy schema validation.
