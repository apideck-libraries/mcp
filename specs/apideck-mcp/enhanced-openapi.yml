x-speakeasy-globals:
  parameters:
    - $ref: '#/components/parameters/consumerId'
    - $ref: '#/components/parameters/applicationId'
x-speakeasy-retries:
  strategy: backoff
  backoff:
    initialInterval: 500
    maxInterval: 60000
    maxElapsedTime: 900000
    exponent: 1.5
  statusCodes:
    - '408'
    - '500'
    - '502'
    - '503'
    - '504'
  retryConnectionErrors: true
