  /hris/employees:
    get:
      operationId: hris.employeesAll
      summary: Retrieve a list of employees from the HRIS system
      description: >-
        This operation fetches a partial list of employee records from the HRIS system, providing a subset of employee
        data due to typical API limitations. Use this endpoint to obtain an overview of employees rather than full
        details. For complete employee information, use the employee detail endpoint instead. The response may not
        include all employee attributes, reflecting the stateless nature of the Unified API.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/employeesFilter'
        - $ref: '#/components/parameters/employeesSort'
        - $ref: '#/components/parameters/passThrough'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          $ref: '#/components/responses/GetEmployeesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - hris
      x-apideck-api: hris
      x-apideck-gotchas:
        - connector: nmbrs
          description: >-
            We keep track of the "List Employees" response for NMBRS virtual webhooks events, which contains fewer
            fields compared to the "Get Employee" response.
        - connector: ceridian-dayforce
          description: >
            The Ceridian Dayforce "List Employees" endpoint only returns employee IDs by default. To get full employee
            details, use the "Get Employee" endpoint. For virtual webhook events on Ceridian Dayforce, we monitor the
            "List Employees" response, which has a very small set of fields in comparison to the "Get Employee"
            response. This is the reason why we only support `hris.employee.created` events for this connector.
        - connector: hibob
          description: >
            HiBob allows you to define employee fields that aren't included by default on the 'List Employees' response.
            By using the fields parameter, you can specifically request these properties to be part of your response.

            Additionally, if your Unify plan has the 'Custom Field Mapping' feature, you can map these properties to
            your responses. Once mapped, they will be included in the custom_mappings property within Unify responses.

            Important to know is that HiBob has permission controls for users to determine which data will be available
            on their API. This can lead to specific fields not being available (example: `birthday`).

            For getting custom field values, please use the 'Get Employee' (employeesOne) call instead of 'List
            Employees'.
        - connector: paylocity
          description: >-
            For virtual webhook events on Paylocity, we monitor the "List Employees" response, which has a very small
            set of fields in comparison of the "Get Employee" response.
        - connector: sage-hr
          description: >
            The minimum pagination `limit` is 50, since Sage HR does not support pagination with a lower limit.
            Pagination for Sage HR only support per 50 limits. Without the employment_status filter it will only return
            active employees. To fetch terminated employees, you need to include the employment_status filter with the
            value "terminated".
        - connector: sap-successfactors
          description: The custom fields are mapped only when they are in the personalInfoNav.
        - connector: hr-works
          description: The employment_status supports filtering on 'active'.
        - connector: bamboohr
          description: >-
            The employment role field will return "other" for list calls when the employee is terminated. To fetch the
            correct employment role data, you need to call the employee detail endpoint.
        - connector: rippling
          description: >-
            Include pass_through[include_terminated] in the query params to include terminated employees in the
            response.
        - connector: workday
          description: >-
            To avoid request timeouts when fetching all employees, it's recommended to use a limit of 20. Workday can
            return large amounts of data per employee, and requests exceeding 30 seconds will timeout with an "Endpoint
            request timed out" error.
        - connector: fourth
          description: >
            The `leaving_reason` field in Fourth is a string and not an enum. We will return `"other"` if there is a
            leaving reason. You can use `custom_mappings` to get the actual value.

            The `manager.id` field may be empty even when `manager.name` is present. This occurs when the manager is a
            former employee who is not included in the active employees list. In such cases, the manager's EmployeeID
            cannot be resolved from the PayrollNumber lookup.
      x-speakeasy-group: hris.employees
      x-speakeasy-name-override: list
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: cursor
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.meta.cursors.next
    post:
      operationId: hris.employeesAdd
      summary: Add a new employee record to the HR system
      description: >-
        This operation creates a new employee record with the provided personal and employment details. Use this
        endpoint when you need to register a new employee in the HR system rather than updating existing records. It
        writes employee data such as names, titles, and identifiers to the database. Ensure all required fields are
        included, as missing data may prevent successful creation.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          $ref: '#/components/responses/CreateEmployeeResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - hris
      x-apideck-api: hris
      x-apideck-gotchas:
        - connector: hibob
          description: >
            When creating an employee is required by Hibob to include the following Unifiy fields: first_name,
            last_name, employment_start_date, jobs[0].location.name and an email with a primary type must be provided
            within the emails field.

            For countries hibob doesn't accept iso code or name values so just the country common name. Example 'United
            States'

            HiBob API just accepts one compensation, so for the request it will be considered the first one sent in the
            array and the payment unit is sent yearly by default.
        - connector: humaans-io
          description: >
            When creating an employee in Humaans, it is mandatory to include the following Unify fields: first_name,
            last_name, title, employment_start_date, jobs[0].location.id. Additionally, within the 'emails' field, you
            must provide an email with a 'primary' type. Furthermore, if the employee is remote, the primary address
            city will be used as the remote city, and this value should be valid."
        - connector: nmbrs
          description: >
            When creating an employee, the `employment_role.type` values accepted for NMbrs are `employee`, `contractor`
            and `freelance`.


            **Important**: Nmbrs requires nationality data (`nationalities` field) for employees with type "payroll".
            When nationality is not provided:

            - Employees with `employment_role.type: "employee"` are automatically created as "external" type instead of
            "payroll" to avoid validation errors

            - This may affect payroll processing, benefits eligibility, and reporting in Nmbrs

            - To create employees as "payroll" type, ensure the `nationalities` field contains at least one ISO country
            code

            - Contractors and freelancers are always created as "external" type regardless of nationality
      x-speakeasy-group: hris.employees
      x-speakeasy-name-override: create
  /hris/employees/{id}:
    get:
      operationId: hris.employeesOne
      summary: Retrieve detailed information about a specific employee
      description: >-
        This operation fetches comprehensive data for a single employee identified by their unique ID. Use this endpoint
        when you need to view or verify individual employee details rather than bulk employee data. It reads employee
        records from the HRIS database without modifying any data. Ensure the employee ID provided exists to avoid
