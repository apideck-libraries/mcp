        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: xero
          description: >
            Xero will only allow deleting a Credit Note if it is in draft status.

            Credit notes with "authorised" status cannot be deleted directly. Instead:

            - If the credit note is empty (i.e., has no invoice allocations and payments), its status can be updated to
            "voided" by update Credit Note endpoint.

            - If the credit note has invoice allocations and payments, these must be removed first. Once all invoice
