openapi: 3.0.3
info:
  title: Apideck
  description: 'The Apideck OpenAPI Spec: SDK Optimized'
  version: 10.24.28
  contact:
    name: Apideck
    url: https://apideck.com
    email: support@apideck.com
servers:
  - url: https://unify.apideck.com
paths:
  /accounting/tax-rates:
    get:
      operationId: accounting.taxRatesAll
      summary: Retrieve a list of all tax rates available in the accounting system
      description: >-
        This operation fetches all tax rates configured in the accounting system. Use this endpoint when you need to
        obtain tax rate information for reporting or calculation purposes. Note that some connectors, such as
        QuickBooks, may not provide the actual tax percentage and instead return only the tax code or reference. This
        endpoint reads tax rate data without modifying any records.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/taxRatesFilter'
        - $ref: '#/components/parameters/passThrough'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          $ref: '#/components/responses/GetTaxRatesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: netsuite
          description: >
            The minimun page size accepted for Netsuite is 5. The cursor for Netsuite expires if they have not been used
            within 15 minutes after its creation. NetSuite supports compound taxes through the `components` array,
            allowing multi-tier tax structures (e.g., state + county taxes).
        - connector: quickbooks
          description: >
            In quickbooks, the tax rates resource does not support pagination. QuickBooks returns tax codes rather than
            complete tax rate data. The `effective_tax_rate` may not be populated; use `code` to reference the tax in
            invoice line items.
        - connector: xero
          description: >
            Xero tax rates include `effective_tax_rate` for the combined percentage. Tax types are categorized as INPUT
            (purchases), OUTPUT (sales), or NONE. Use the appropriate tax type when applying rates to invoices vs bills.
        - connector: sage-intacct
          description: >
            Sage Intacct supports multi-component taxes through the `components` array. Each component can have its own
            rate and tax authority. Use compound taxes for jurisdictions with multiple tax layers (e.g., GST + PST in
            Canada).
      x-speakeasy-group: accounting.taxRates
      x-speakeasy-name-override: list
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: cursor
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.meta.cursors.next
    post:
      operationId: accounting.taxRatesAdd
      summary: Create a new tax rate in the accounting system
      description: >-
        This operation creates a new tax rate record with specified details such as name, code, rates, and associated
        accounts. Use this endpoint when you need to add a tax rate that your accounting processes will apply to
        transactions. It writes the tax rate data into the system, making it available for future tax calculations and
        reporting. Ensure that the tax rate details are accurate and complete, as incorrect rates can affect financial
        records and compliance.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxRate'
      responses:
        '201':
          $ref: '#/components/responses/CreateTaxRateResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: quickbooks
          description: >
            To create a tax rate, `effective_tax_rate`, `tax_payable_account_id`, `name` and a `component` is required.
            If `tax_payable_account_id` is unknown, make a proxy call to get list of TaxAgency. [TaxAgency
            doc](https://developer.intuit.com/app/developer/qbo/docs/api/accounting/all-entities/taxagency#query-a-taxagency)
      x-speakeasy-group: accounting.taxRates
      x-speakeasy-name-override: create
  /accounting/tax-rates/{id}:
    get:
      operationId: accounting.taxRatesOne
      summary: Retrieve a specific tax rate by its ID
      description: >-
        This operation fetches details of a tax rate using its unique identifier. Use this endpoint when you need to
        obtain tax rate information for accounting purposes. Note that some connectors, such as Quickbooks, may only
        return the tax code or reference instead of the actual rate or percentage. Future updates will enhance this by
        performing additional background calls to provide the complete tax rate details.
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          $ref: '#/components/responses/GetTaxRateResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-speakeasy-group: accounting.taxRates
      x-speakeasy-name-override: get
    patch:
      operationId: accounting.taxRatesUpdate
      summary: Update an existing tax rate with new details
      description: >-
        Modify the properties of an existing tax rate to reflect changes such as name, code, rates, or accounts. Use
        this operation when you need to correct or adjust tax rate information rather than creating a new one. It
        updates the stored tax rate data and affects calculations that rely on this tax rate. Ensure the tax rate ID
        exists and that updates comply with applicable tax regulations.
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/raw'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxRate'
      responses:
        '200':
          $ref: '#/components/responses/UpdateTaxRateResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-speakeasy-group: accounting.taxRates
      x-speakeasy-name-override: update
    delete:
      operationId: accounting.taxRatesDelete
      summary: Delete a tax rate by its ID
      description: >-
        Deletes the specified tax rate from the accounting system. Use this operation when you need to remove an
        obsolete or incorrect tax rate. This action permanently removes the tax rate and cannot be undone. Ensure the
        tax rate is not in use before deletion to avoid data inconsistencies.
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/raw'
      responses:
        '200':
          $ref: '#/components/responses/DeleteTaxRateResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-speakeasy-group: accounting.taxRates
      x-speakeasy-name-override: delete
  /accounting/bills:
    get:
      operationId: accounting.billsAll
      summary: Retrieve a list of all bills in the accounting system
      description: >-
        Fetches a comprehensive list of bills recorded in the accounting system. Use this operation when you need to
        view or process multiple bills at once, unlike operations that handle single bill details. It reads the stored
        bill data without modifying any records. This operation may return large datasets, so consider filtering or
        pagination if supported.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/billsFilter'
        - $ref: '#/components/parameters/billsSort'
        - $ref: '#/components/parameters/passThrough'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          $ref: '#/components/responses/GetBillsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: clearbooks-uk
          description: Clearbooks does not support setting the pagination size.
        - connector: freshbooks
          description: The Freshbooks Bills api is currently in beta.
        - connector: netsuite
          description: >
            The minimun page size accepted for Netsuite is 5. The cursor for Netsuite expires if they have not been used
            within 15 minutes after its creation.
      x-speakeasy-group: accounting.bills
      x-speakeasy-name-override: list
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: cursor
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.meta.cursors.next
    post:
      operationId: accounting.billsAdd
      summary: Create a new bill in the accounting system
      description: >-
        This operation creates a new bill record associated with a company, supplier, and relevant accounting details.
        Use this endpoint when you need to add a bill to track expenses or liabilities within your accounting workflow.
        It writes data such as bill number, supplier information, currency, tax details, and related organizational
        units. Ensure that required fields like company ID and supplier are correctly provided to avoid errors.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bill'
      responses:
        '201':
          $ref: '#/components/responses/CreateBillResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: xero
          description: >
            When providing both supplier.id and supplier.display_name (or supplier.name), Xero will update the contact's
            name if the ContactID exists. If the ContactID doesn't exist, Xero will automatically create a new contact
            using the provided name. This allows for automatic contact creation but may update existing contact names if
            the display_name differs from the stored name.
        - connector: procountor-fi
          description: ''
          Procountor only accepts the following values for the language field: EN, FI, SV, ET, NO, and DA.
          Procountor only accepts the following values for the payment_method field: >-
            BANK_TRANSFER, DIRECT_PAYMENT, CLEARING, CREDIT_CARD_CHARGE, FOREIGN_PAYMENT, OTHER, CASH,
            DOMESTIC_PAYMENT_PLUSGIRO, DOMESTIC_PAYMENT_BANKGIRO, DOMESTIC_PAYMENT_CREDITOR, DKLMPKRE, NETS.
          Procountor only accepts the following values for the channel field: EMAIL, MAIL, ELECTRONIC_INVOICE, EDIFACT, PAPER_INVOICE, NO_SENDING.
        - connector: quickbooks
          description: >
            When creating a bill in QuickBooks, each line item must be accompanied by a type designation. If the type is
            set to "expense_item," an item ID is required. Conversely, if the type is "expense_account," a ledger
            account ID must be provided.

            Additionally, multicurrency needs to be enabled in your QBO account. If creating a bill in your default
            currency, you do not need to send the currency value as long as the supplier uses the same currency. For
            bills with suppliers using a different currency than your default, you must include the currency value,
            matching the supplier's configured currency. To change the currency of a customer or vendor, a new one must
            be created with the desired currency. Foreign currencies can only be sent to suppliers configured with that
            currency.
        - connector: netsuite
          description: |
            For creating or updating a bill in Netsuite, its required to provide the line type.
        - connector: microsoft-dynamics-365-business-central
          description: >
            If you encounter a '400 Bad Request' error indicating "Control 'fieldName' is read-only" it means the
            'editable' property for this field in Microsoft Dynamics 365 Business Central is currently set to false. To
            resolve this issue and make the field writable, simply update the 'editable' property to true in Microsoft
            Dynamics 365 Business Central. Additionally, line item tax rates must be specified by tax rate *code* (e.g.,
            "G3"), not by ID. In U.S.-regionalized Business Central tenants, the `tax_inclusive` field cannot be set to
            `true`.
        - connector: zoho-books
          description: |
            The status of the bill will be "submitted" by default when creating a bill.
      x-speakeasy-group: accounting.bills
      x-speakeasy-name-override: create
  /accounting/bills/{id}:
    get:
      operationId: accounting.billsOne
      summary: Retrieve a specific bill by its ID
      description: >-
        Fetches detailed information about a single bill using its unique identifier. Use this operation when you need
        to view or verify the details of an existing bill rather than listing multiple bills or creating new ones. It
        reads the bill data without modifying it. Ensure the provided ID corresponds to an existing bill to avoid
        errors.
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          $ref: '#/components/responses/GetBillResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: freshbooks
          description: The Freshbooks Bills api is currently in beta.
      x-speakeasy-group: accounting.bills
      x-speakeasy-name-override: get
    patch:
      operationId: accounting.billsUpdate
      summary: Update an existing bill with new details
      description: >-
        This operation modifies the details of an existing bill in the accounting system. Use this endpoint when you
        need to change information such as supplier, amounts, dates, or related company data for a specific bill. It
        updates the stored bill record and may affect financial reports or downstream processes that rely on bill data.
        Ensure the bill ID is correct and that changes comply with your accounting policies to avoid inconsistencies.
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/raw'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bill'
      responses:
        '200':
          $ref: '#/components/responses/UpdateBillResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: procountor-fi
          description: ''
          Procountor only accepts the following values for the language field: EN, FI, SV, ET, NO, and DA.
          Procountor only accepts the following values for the payment_method field: >-
            BANK_TRANSFER, DIRECT_PAYMENT, CLEARING, CREDIT_CARD_CHARGE, FOREIGN_PAYMENT, OTHER, CASH,
            DOMESTIC_PAYMENT_PLUSGIRO, DOMESTIC_PAYMENT_BANKGIRO, DOMESTIC_PAYMENT_CREDITOR, DKLMPKRE, NETS.
          Procountor only accepts the following values for the channel field: EMAIL, MAIL, ELECTRONIC_INVOICE, EDIFACT, PAPER_INVOICE, NO_SENDING.
        - connector: Quickbooks
          description: Quickbooks requires the supplier.id to be sent in order to make update operations.
        - connector: zoho-books
          description: |
            The allowed values for the status field are "draft", "submitted" and "void" when using the update method.
            Please send status updates separately from other bill updates.
        - connector: xero
          description: >-
            Bills in xero can be tax inclusive, tax exclusive or no tax. The tax_inclusive field should be set to true,
            false or null if the bill is tax inclusive, tax exclusive or no tax.
      x-speakeasy-group: accounting.bills
      x-speakeasy-name-override: update
    delete:
      operationId: accounting.billsDelete
      summary: Delete a bill by its ID
      description: >-
        Deletes the specified bill from the accounting system. Use this operation when you need to remove a bill
        permanently, such as when it was created in error or is no longer needed. This action cannot be undone and will
        remove all associated data for the bill. Ensure the bill ID is correct to avoid accidental data loss.
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/raw'
      responses:
        '200':
          $ref: '#/components/responses/DeleteBillResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: freshbooks
          description: >
            Delete will set the bill to inactive and will soft delete it, meaning it will stop appearing in the list API
            call. However, it can still be found via the get by id call.
      x-speakeasy-group: accounting.bills
      x-speakeasy-name-override: delete
  /accounting/invoices:
    get:
      operationId: accounting.invoicesAll
      summary: Retrieve a list of all invoices
      description: >-
        Fetches a complete list of invoices from the accounting system. Use this operation when you need to view or
        process multiple invoices at once, unlike operations that handle single invoice details. This call reads invoice
        data without modifying it and may return large datasets depending on the number of invoices stored.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/invoicesFilter'
        - $ref: '#/components/parameters/invoicesSort'
        - $ref: '#/components/parameters/passThrough'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          $ref: '#/components/responses/GetInvoicesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - accounting
      x-apideck-api: accounting
      x-apideck-gotchas:
        - connector: clearbooks-uk
          description: Clearbooks does not support setting the pagination size.
        - connector: netsuite
          description: >
            The minimun page size accepted for Netsuite is 5. The cursor for Netsuite expires if they have not been used
            within 15 minutes after its creation.

            When using filters or sort parameters (which trigger the SuiteQL path), `quantity` and `unit_price` on line
            items may reflect base-unit values (e.g., days) rather than selling-unit values (e.g., years) for items with
            Units of Measure (UOM) enabled. `total_amount` is always accurate regardless. Use the GET one endpoint for
            selling-unit quantities.
        - connector: xero
          description: >
            Invoices in Xero can be tax inclusive, tax exclusive, or no tax. The `tax_inclusive` field is set to `true`
            (tax inclusive), `false` (tax exclusive), or `null` (no tax). Line items include `tax_rate` references that
            link to the tax-rates resource.
        - connector: quickbooks
          description: >
            QuickBooks uses tax codes rather than tax rates. The `tax_rate` on line items references a tax code, which
            may not include the actual percentage value. To get the actual rate, retrieve the full tax rate details via
            the tax-rates endpoint.
      x-speakeasy-group: accounting.invoices
      x-speakeasy-name-override: list
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: cursor
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.meta.cursors.next
    post:
      operationId: accounting.invoicesAdd
      summary: Create a new invoice in the accounting system
      description: >-
        This operation creates a new invoice record with specified details such as type, customer, dates, and related
        company information. Use this endpoint when you need to add an invoice rather than update or retrieve existing
        ones. It writes invoice data to the accounting database and may trigger downstream processes related to billing
        and reporting. Ensure required fields are provided and valid to avoid creation errors.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/serviceId'
        - $ref: '#/components/parameters/companyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invoice'
      responses:
        '201':
          $ref: '#/components/responses/CreateInvoiceResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
