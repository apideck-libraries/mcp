        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - webhook
      x-apideck-api: webhook
      x-speakeasy-group: webhook.webhooks
      x-speakeasy-name-override: get
    patch:
      operationId: webhook.webhooksUpdate
      summary: Update a webhook subscription and validate its delivery URL if changed
      description: >-
        This operation updates an existing webhook subscription, allowing changes to its delivery URL, description,
        status, and subscribed events. Use this endpoint when you need to modify webhook settings, especially to update
        the delivery URL, which triggers a synchronous validation via an HTTP POST with an HMAC signature. If the
        delivery URL validation fails due to network issues, timeouts, or non-2xx responses, the webhook is updated but
        automatically disabled with a specific disabled reason. Always verify the webhook's status and disabled reason
        after updating to confirm it remains active.
      parameters:
        - $ref: '#/components/parameters/webhookToken'
        - $ref: '#/components/parameters/applicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
      responses:
        '200':
          $ref: '#/components/responses/UpdateWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - webhook
      x-apideck-api: webhook
      x-speakeasy-group: webhook.webhooks
      x-speakeasy-name-override: update
    delete:
      operationId: webhook.webhooksDelete
      summary: Delete a webhook subscription by its ID
      description: >-
        This operation removes an existing webhook subscription identified by its ID. Use this to stop receiving events
        or notifications from the webhook source. Deleting a webhook subscription permanently disables its event
        delivery and cannot be undone. Ensure the ID corresponds to an active subscription to avoid errors.
      parameters:
        - $ref: '#/components/parameters/webhookToken'
        - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          $ref: '#/components/responses/DeleteWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - webhook
      x-apideck-api: webhook
      x-speakeasy-group: webhook.webhooks
      x-speakeasy-name-override: delete
  /webhook/logs:
    get:
      operationId: webhook.eventLogsAll
      summary: Retrieve a list of all webhook event logs
      description: >-
        This operation fetches all recorded webhook event logs. Use it to review the history of webhook events for
        monitoring or debugging purposes. It reads stored event data without modifying any records. There are no special
        constraints beyond standard access permissions.
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/filter1'
      responses:
        '200':
          $ref: '#/components/responses/GetWebhookEventLogsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - apiKey: []
      tags:
        - webhook
      x-apideck-api: webhook
      x-speakeasy-group: webhook.eventLogs
      x-speakeasy-name-override: list
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: cursor
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.meta.cursors.next
