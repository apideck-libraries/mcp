      type: object
      properties:
        status_code:
          description: HTTP status code
          type: number
          example: 400
        error:
          description: Contains an explanation of the status_code as defined in HTTP/1.1 standard (RFC 7231)
          type: string
          example: Bad Request
        type_name:
          description: The type of error returned
          type: string
          example: RequestValidationError
        message:
          description: A human-readable message providing more details about the error.
          type: string
          example: Invalid Params
          x-speakeasy-error-message: true
        detail:
          description: Contains parameter or domain specific information related to the error and why it occurred.
          anyOf:
            - type: string
              example: Missing property foobar
            - type: object
              example:
                missing:
                  - foobar: required
              additionalProperties: true
        ref:
          description: Link to documentation of error type
          type: string
          example: https://developers.apideck.com/errors#requestvalidationerror
        downstream_errors:
          description: >-
            Contains downstream errors returned from the connector. Only present when type_name is
            ConnectorExecutionError.
          type: array
          items:
            type: object
            properties:
              message:
                description: Error message from the downstream provider
                type: string
              detail:
                description: Additional error details
                type: string
              code:
                description: Error code from the downstream provider
                type: string
          example:
            - message: Account code '100' has been archived or deleted
              detail: Each line item must reference a valid account
              code: VALIDATION_ERROR
