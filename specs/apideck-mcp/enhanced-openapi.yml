                description: The counterparty of the transaction.
                type: string
                example: ACME Corp
                title: Counterparty
              reference:
                description: The reference of the transaction.
                type: string
                example: INV-2025-01
                title: Reference
              transaction_type:
                description: Type of transaction.
                type: string
                example: payment
                enum:
                  - credit
                  - debit
                  - deposit
                  - transfer
                  - payment
                  - other
                title: Transaction Type
                x-apideck-enum-id: bank_feed_statements.transaction_type
