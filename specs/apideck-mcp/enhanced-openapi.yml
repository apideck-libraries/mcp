        This operation creates a new journal entry with specified details such as line items, currency, status, and
        posting date. Use this endpoint when you need to record financial transactions or adjustments in the accounting
        records. It writes the journal entry data to the system, affecting financial reporting and audit trails. Ensure
        that the entry complies with accounting rules and that required fields like company ID and currency are
        correctly provided.
      parameters:
        - $ref: '#/components/parameters/raw'
        - $ref: '#/components/parameters/consumerId'
