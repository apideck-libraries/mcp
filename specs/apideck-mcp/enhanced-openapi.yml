  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: >
        To access our API, you need to sign up and obtain your unique API key. Each Unify application is assigned a
        single API key. You can locate your API key in the Configuration Settings section of your Apideck application.
        Additionally, your application’s application_id is available on the same page.


        Authenticate your API requests by including your test or live secret API key in the request header.


        - Bearer authorization header: `Authorization: Bearer "YOUR_API_KEY_HERE"`

        - Application id header: `x-apideck-app-id: "YOUR_APP_ID_HERE"`


        You should use the public keys on the SDKs and the secret keys to authenticate API requests.


        **Do not share or include your secret API keys on client side code.** Your API keys carry significant
        privileges. Please ensure to keep them 100% secure and be sure to not share your secret API keys in areas that
        are publicly accessible like GitHub.


        Learn how to set the Authorization header inside Postman
        https://learning.postman.com/docs/postman/sending-api-requests/authorization/#api-key


        Go to Unify to grab your API KEY https://app.apideck.com/unify/api-keys
    applicationId:
      type: apiKey
      in: header
      name: x-apideck-app-id
      description: The ID of your Unify application
    consumerId:
      type: apiKey
      in: header
      name: x-apideck-consumer-id
      description: The ID of the consumer which you want to get or push data from
